<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sooner Form | Version Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #F5F4F0; /* cream */
            color: #1C1B17; /* dark */
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 350px;
            background-color: #FFFFFF;
            border-right: 1px solid #E0E0E0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .sidebar h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 10px 0;
        }
        .sidebar p {
            font-size: 14px;
            color: #666;
            margin: 0 0 30px 0;
        }
        .version-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }
        .version-item {
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .version-item.active {
            border-color: #E9FE0F; /* yellow */
            background-color: #f8f8f4;
        }
        .version-item:hover:not(.active) {
            background-color: #f0f0f0;
        }
        .version-label {
            font-weight: 600;
            font-size: 16px;
        }
        .version-date {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .preview-pane {
            flex-grow: 1;
            height: 100vh;
            border: none;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            font-size: 10px;
            font-weight: 700;
            border-radius: 12px;
            text-transform: uppercase;
            margin-left: 8px;
        }
        .status-badge.live { background-color: #E9FE0F; color: #1C1B17; }
        .status-badge.archived { background-color: #e0e0e0; color: #666; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>Sooner Form</h1>
        <p>Version Manager</p>
        <ul id="versionList" class="version-list">
            <!-- Versions will be loaded here by JavaScript -->
        </ul>
    </div>

    <iframe id="previewPane" class="preview-pane"></iframe>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const versionList = document.getElementById('versionList');
            const previewPane = document.getElementById('previewPane');

            fetch('versions.json')
                .then(response => response.json())
                .then(data => {
                    loadVersions(data);
                    // Load the latest version by default
                    if (data.length > 0) {
                        const latestVersion = data.find(v => v.status === 'live') || data[0];
                        loadPreview(latestVersion.file);
                        highlightActive(latestVersion.id);
                    }
                });

            function loadVersions(versions) {
                versions.forEach(version => {
                    const li = document.createElement('li');
                    li.className = 'version-item';
                    li.dataset.versionId = version.id;
                    li.innerHTML = \`
                        <div class="version-label">
                            \${version.label}
                            <span class="status-badge \${version.status}">\${version.status}</span>
                        </div>
                        <div class="version-date">\${version.date}</div>
                    \`;
                    li.addEventListener('click', () => {
                        loadPreview(version.file);
                        highlightActive(version.id);
                    });
                    versionList.appendChild(li);
                });
            }

            function loadPreview(url) {
                previewPane.src = url;
            }
            
            function highlightActive(versionId) {
                document.querySelectorAll('.version-item').forEach(item => {
                    item.classList.remove('active');
                    if (item.dataset.versionId === versionId) {
                        item.classList.add('active');
                    }
                });
            }
        });
    </script>

</body>
</html>
